<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speax Tools Hub</title>
    <link rel="stylesheet" href="/tool-shared.css">
    <style>
        :root {
            --nav-height: 60px;
        }

        body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--background);
        }

        .navbar {
            height: var(--nav-height);
            background: var(--surface);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 2rem;
            gap: 2rem;
            z-index: 1000;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            margin-right: 1rem;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            height: 100%;
            align-items: center;
        }

        .tab {
            padding: 0.5rem 1.25rem;
            border-radius: 20px;
            cursor: pointer;
            color: var(--on-surface-medium);
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            background: transparent;
            border: 1px solid transparent;
        }

        .tab:hover {
            color: var(--on-surface);
            background: var(--glass);
        }

        .tab.active {
            color: var(--on-surface);
            background: var(--glass);
            border-color: var(--glass-border);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 3px;
            background: var(--primary);
            border-radius: 3px;
            box-shadow: 0 0 8px var(--primary);
        }

        .content-area {
            flex: 1;
            position: relative;
            background: var(--background);
        }

        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
            transition: opacity 0.3s ease;
        }

        iframe.active {
            display: block;
        }

        .tool-status {
            margin-left: auto;
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }

        .logout-link {
            color: var(--on-surface-medium);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .logout-link:hover {
            color: var(--error);
            background: rgba(255, 82, 82, 0.1);
            border-color: rgba(255, 82, 82, 0.2);
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">Speax</div>
        <div class="tabs">
            <div class="tab active" data-tool="search">Search</div>
            <div class="tab" data-tool="notes">Notes & Tasks</div>
            <div class="tab" data-tool="timer">Timers</div>
        </div>
        <div class="tool-status">
            <div id="global-status" class="status-indicator">
                <div class="dot online"></div>
                <span>Speax Tools Online</span>
            </div>
            <a href="/auth/logout" class="logout-link">Logout</a>
        </div>
    </nav>

    <main class="content-area">
        <iframe id="iframe-search" src="/search-tool.html" class="active"></iframe>
        <iframe id="iframe-notes" src="/notes-tool.html"></iframe>
        <iframe id="iframe-timer" src="/timer-tool.html"></iframe>
    </main>

    <script type="module">
        const tabs = document.querySelectorAll('.tab');
        const iframes = document.querySelectorAll('iframe');

        function switchTab(tool) {
            // Update tabs
            tabs.forEach(t => {
                if (t.dataset.tool === tool) {
                    t.classList.add('active');
                } else {
                    t.classList.remove('active');
                }
            });

            // Update iframes
            iframes.forEach(iframe => {
                if (iframe.id === `iframe-${tool}`) {
                    iframe.classList.add('active');
                } else {
                    iframe.classList.remove('active');
                }
            });

            // Persist
            localStorage.setItem('speax_last_tool', tool);
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                switchTab(tab.dataset.tool);
            });
        });

        // Initialize from storage
        const lastTool = localStorage.getItem('speax_last_tool');
        if (lastTool) {
            const tabExists = Array.from(tabs).some(t => t.dataset.tool === lastTool);
            if (tabExists) switchTab(lastTool);
        }

        // Listen for events from tools
        window.addEventListener('message', (event) => {
            if (event.data.type === 'TOOL_EVENT') {
                console.log(`Tool Event [${event.data.event}]:`, event.data.data);
                // We could show toast notifications here if desired
            }
        });
    </script>
</body>
</html>
