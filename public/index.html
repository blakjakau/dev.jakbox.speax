<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speax Client</title>
    <style>
        body { font-family: monospace; background: #1e1e1e; color: #d4d4d4; padding: 15px; margin: 0; display: flex; flex-direction: column; max-width: 800px; margin: 0 auto; height: 100vh; height: 100dvh; box-sizing: border-box; }
        #status { color: #4ec9b0; }
        #transcript { border: 1px solid #333; padding: 10px; flex-grow: 1; overflow-y: auto; overflow-x: hidden; margin-top: 15px; border-radius: 4px; background: #252526; scroll-behavior: smooth; white-space: pre-wrap; word-wrap: break-word; }
        button { padding: 12px 20px; font-size: 16px; margin-right: 5px; margin-bottom: 10px; cursor: pointer; border: none; border-radius: 4px; background: #0e639c; color: white; }
        button:disabled { background: #4d4d4d; cursor: not-allowed; }
        .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; align-items: center; }
        
        @media (max-width: 600px) {
            button { width: 100%; margin-right: 0; }
        }
    </style>
</head>
<body>
    <h1>Speax v1.0</h1>
    <div id="status">Status: Disconnected</div>
    
    <div class="controls">
        <button id="start">Start Dictation</button>
        <button id="stop" disabled>Stop</button>
    </div>

    <div id="transcript"></div>

    <script src="app.js"></script>
</body>
</html>
