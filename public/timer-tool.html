<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speax Timers</title>
    <link rel="stylesheet" href="/tool-shared.css">
    <style>
        .timer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
            overflow-y: auto;
            flex: 1;
        }
        .timer-card {
            background: var(--surface-variant);
            padding: 1.25rem;
            border-radius: 12px;
            border-left: 4px solid var(--secondary);
            position: relative;
            transition: transform 0.2s;
            height: fit-content;
        }
        .timer-card.expired { border-left-color: var(--error); animation: pulse 2s infinite; }
        .timer-card.done { opacity: 0.5; border-left-color: var(--on-surface-medium); }
        
        .timer-label { font-weight: 600; margin-bottom: 0.5rem; font-size: 0.9rem; }
        .timer-time { font-size: 1.5rem; font-family: 'Fira Code', monospace; color: var(--primary); }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(207, 102, 121, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(207, 102, 121, 0); }
            100% { box-shadow: 0 0 0 0 rgba(207, 102, 121, 0); }
        }
    </style>
</head>
<body class="tool-content">
    <div class="header" id="tool-header">
        <h1><span class="badge">Timers</span></h1>
        <div class="status-indicator">
            <div id="status-dot" class="dot"></div>
            <span id="status-text">Disconnected</span>
        </div>
    </div>

    <div class="tool-body">
        <div class="tool-main">
            <div id="timer-list" class="timer-grid"></div>
        </div>
        <div id="logs" class="logs"></div>
    </div>

    <script type="module">
        import { SpeaxToolClient } from '/speax-tool-client.mjs';
        import { setupStatusIndicator, createLogger } from '/tool-shared.mjs';

        const logger = createLogger('logs');
        const timerList = document.getElementById('timer-list');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        if (window.parent !== window) document.getElementById('tool-header').classList.add('hidden');

        let timers = JSON.parse(localStorage.getItem('speax_timers') || '[]');
        let client = null;

        function save() { localStorage.setItem('speax_timers', JSON.stringify(timers)); }

        function render() {
            timerList.innerHTML = '';
            const now = Date.now();
            const oneHourAgo = now - (60 * 60 * 1000);
            timers = timers.filter(t => !(t.notified && t.end < oneHourAgo));

            timers.forEach(t => {
                const remaining = Math.max(0, Math.floor((t.end - now) / 1000));
                const div = document.createElement('div');
                const statusClass = t.notified ? 'done' : (remaining === 0 ? 'expired' : '');
                div.className = `timer-card ${statusClass}`;
                div.innerHTML = `
                    <button class="btn-icon delete" style="position: absolute; top: 10px; right: 10px;" onclick="window.removeTimer('${t.id}')">✕</button>
                    <div class="timer-label">${t.label}</div>
                    <div class="timer-time">${t.notified ? 'DONE' : formatTime(remaining)}</div>
                `;
                timerList.appendChild(div);
            });
            save();
        }

        function formatTime(sec) {
            const h = Math.floor(sec / 3600);
            const m = Math.floor((sec % 3600) / 60);
            const s = sec % 60;
            return [h, m, s].map(v => v.toString().padStart(2, '0')).join(':');
        }

        window.removeTimer = (id) => {
            timers = timers.filter(t => t.id !== id);
            save();
            render();
        };

        setInterval(() => {
            const now = Date.now();
            timers.forEach(t => {
                if (!t.notified && now >= t.end && client.socket?.readyState === WebSocket.OPEN) {
                    t.notified = true;
                    logger.log(`Timer Expired: ${t.label}`);
                    client.sendEvent('TIMER_EXPIRED', { id: t.id, label: t.label });
                    save();
                }
            });
            render();
        }, 1000);

        client = new SpeaxToolClient(window.location.origin, 'TimerTool');
        setupStatusIndicator(client, 'status-dot', 'status-text');

        client.registerAction('set_timer', 'Sets a countdown timer.', () => ({
            type: 'object', properties: { seconds: { type: 'number' }, label: { type: 'string' } }, required: ['seconds']
        }), async (a) => {
            const id = Math.random().toString(36).substr(2, 9);
            const timer = { id, label: a.label || 'Timer', end: Date.now() + (a.seconds * 1000), notified: false };
            timers.push(timer);
            save();
            logger.log(`AI set timer: "${timer.label}" (${a.seconds}s)`);
            return { success: true, id };
        });

        client.registerAction('list_timers', 'Lists all timers.', () => ({}), async () => ({ timers }));
        client.registerAction('cancel_timer', 'Cancels a timer.', () => ({
            type: 'object', properties: { id: { type: 'string' } }, required: ['id']
        }), async (a) => {
            const exists = timers.some(t => t.id === a.id);
            timers = timers.filter(t => t.id !== a.id);
            save();
            return { success: exists };
        });

        client.connect();
        render();
    </script>
</body>
</html>
